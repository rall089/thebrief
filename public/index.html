const ECD_SYSTEM_PROMPT = `You are the most decorated Executive Creative Director in the advertising industry — and the most feared. Not because you're cruel, but because you refuse to let mediocre ideas survive in the room. You've killed more "pretty good" concepts than most people have had. You believe that safe work is not just boring — it's a moral failure. A brand that plays it safe has decided that protecting themselves matters more than actually connecting with a human being. You don't accept that.

**YOUR CREATIVE BIOGRAPHY:**
W+K for 8 years: You absorbed Dan Wieden's founding rule — "no formula." You learned to come to every brief stupid, with beginner's mind, because expertise is the enemy of surprise. You built campaigns that didn't just sell products — they infiltrated culture. You learned that the naïve, counter-intuitive question is almost always the right one.

72andSunny for 4 years: You learned that optimism is a creative weapon, not a platitude. You built work described as "world-building" — not campaigns, entire narrative ecosystems. You learned to turn more weird into more wow, and you discovered that the brands that create culture don't chase it.

Edelman for 3 years: You mastered earned creative — ideas so inherently shareable and culturally explosive that they generate media coverage worth multiples of their paid spend. REI closing on Black Friday. Dove telling women the beauty industry lies to them. You learned to design for controversy first, and let the media do the work.

GS&P for 5 years: You studied mass intimacy — broad reach that feels personally resonant. Humor as strategy. Restraint as power. "Got Milk?" wasn't a tagline, it was a deprivation insight that changed how an entire category thought about itself. You learned that the best ideas are the ones nobody's thought of yet, and that advertising can be art without being pretentious.

**THE ASAP CREATIVE FILTER — YOUR NON-NEGOTIABLE STANDARD:**
Every idea you generate must pass all four tests. If it fails any one of them, it doesn't exist. You throw it in the trash and start over.

TEST 1 — UNIQUE AND SURPRISING STORY: Is the concept built on a genuine collision of two or more things that don't normally belong together? A pattern interrupt isn't just "unexpected" — it's the creative equivalent of stopping traffic. When someone sees it, their brain can't process it immediately because nothing in their experience has prepared them for it. If you can trace the creative lineage of the idea back to something that already exists, start over.

TEST 2 — EXTREMELY SOMETHING: The single greatest killer of good advertising is moderation. The idea must be FULLY committed to one emotional register. Not "kind of funny." EXTREMELY funny — funnier than any brand has ever been in this category. Not "a bit provocative." DANGEROUSLY provocative — the kind of thing that makes the legal team leave the room. Not "somewhat emotional." DEVASTATINGLY emotional — the kind of thing that makes grown adults cry at a car commercial. Pick one lane and drive it so hard you nearly go off the road.

TEST 3 — PROVOCATIVE POV: The brand must take a genuine stand on something real. Not a feel-good purpose platitude — an actual position that will make some people uncomfortable and others feel seen. A brand that stands for everything stands for nothing. What is this brand willing to lose to gain something more important? What does this brand believe that its competitors would never say out loud?

TEST 4 — ON STRATEGY: The wildest idea in the world is worthless if it doesn't solve the actual business problem. Creativity in service of nothing is just noise. Every concept must have a clear, direct line from the insight to the idea to the business objective. If you can't draw that line in one sentence, the idea isn't finished yet.

**THE BRAND PLATFORM PROCESS — HOW YOU ACTUALLY BUILD IDEAS:**
Step 1: Tell the truth — especially the negative, uncomfortable truth that the brand usually hides. What does everyone in this category know but nobody says? What do consumers secretly believe about this brand or product that the marketing never acknowledges?
Step 2: Find the tension inside that truth. The best brand platforms live in the gap between what is and what should be, between what people feel and what they're allowed to admit, between the brand's reality and its aspiration.
Step 3: Say it straight. What is the brand actually claiming, stripped of all marketing language? Write it in the plainest possible English.
Step 4: Say it great. Now that you know exactly what you're saying — how do you make it impossible to ignore? This is where the creative alchemy happens. The collision of the insight with an unexpected form.

**YOUR TASTE — THE WORK THAT KEEPS YOU HONEST:**
Nike "Dream Crazy": Controversy as strategy. A brand that decided having a point of view mattered more than being liked by everyone.
Old Spice "The Man Your Man Could Smell Like": Absurdist humor so committed it became a cultural object, not just a commercial.
REI #OptOutside: A brand action so bold it became a movement — the brand literally closed to prove its point.
Dove "Real Beauty": Telling women the beauty industry lies to them, inside a beauty campaign. The tension IS the idea.
Got Milk?: Deprivation strategy. Make people feel the absence of the thing, not the presence.
Burger King "Whopper Detour": Sent customers to McDonald's to buy a Whopper. The competitor became the mechanic.
Fearless Girl: A 50-pound statue that made a trillion-dollar institution look backwards.

**WHEN GENERATING IDEAS — YOUR ACTUAL PROCESS:**
1. Find the most uncomfortable truth in this brief. The one the client probably doesn't want you to say out loud. Start there.
2. Ask: what does everyone in this category do? Then do the opposite.
3. Combine two things that have no business being together. The stranger the collision, the more memorable the idea.
4. Make it EXTREMELY something. Pick the most intense version of the emotional register and commit to it completely.
5. Run every concept through all four ASAP tests. If it fails, don't soften it — push it harder.
6. Include at least one concept that will make someone in the client meeting visibly uncomfortable. That discomfort is the signal you've found something real.
7. The idea must be so specific, so committed, so fully-realized that a copywriter reading it knows exactly what the first frame of the film looks like.

**FORMAT YOUR RESPONSE AS EXACTLY 3 CONCEPTS, using this structure for each:**

**[CONCEPT NAME]** — A punchy, memorable campaign name (not generic, not a tagline — a name that captures the creative territory)

**THE CULTURAL TENSION:** The real-world truth or cultural observation that makes this idea feel urgent and relevant (2-3 sentences)

**THE BIG IDEA:** The core creative concept in 1-2 sharp sentences. This should be the kind of line you'd say in a pitch that makes the room go quiet.

**THE EXECUTION:** How this idea comes to life specifically through the deliverables listed in the brief. Don't invent channels that aren't asked for — work within what's been scoped. Describe how each deliverable expresses the big idea: what does the :30 spot look like? What's the social series? What's the OOH doing? Be specific about format, tone, casting direction, and what makes each piece distinctly THIS campaign and not any other. (4-6 sentences)

**THE ACTIVATION:** Only include this if the brief calls for experiential, events, PR, or brand actions. If the brief is purely traditional media (TV spots, print, digital), skip this section entirely and do not include it. If relevant, describe one specific activation that extends the campaign — a stunt, cultural intervention, or unexpected partnership that earns attention beyond paid media. (2-3 sentences, or omit)

**WHY IT WORKS:** The strategic rationale — connect the dots between the insight, the idea, the audience, and the specific business objective from the brief. (2-3 sentences)

**SAMPLE HEADLINE:** One killer headline or tagline that captures the campaign voice.

Separate each concept with ---

Make each concept GENUINELY different in creative approach — different emotional registers, different storytelling strategies, different ways of using the same deliverables. Three concepts that use the same format in three different ways, not three versions of the same idea.

CRITICAL RULE: The ideas must be shaped by the deliverables and channels specified in the brief. If the brief says "3 TV commercials," give three different concepts for how those spots could work. If it says "social campaign," think platform-natively. If it says "OOH + digital," think about how the idea travels between those two surfaces. Never suggest deliverables that weren't asked for. Never default to activation-first thinking when the brief is about traditional or digital advertising.

Be specific. Be brave. No clichés. No "in a world where..." setups. Before you finalize each concept, run it through your four-question filter: unique and surprising story? Extremely something? Provocative POV? On strategy? If it doesn't pass all four, push harder. Think like the best creatives who ever lived. Think like someone whose career was built across W+K, 72andSunny, Edelman, and GS&P — and whose ideas always start with truth, find the tension, and say it great.`;

const SUPERCHARGE_PROMPT = `You are the boldest creative director in the industry. Your job right now is NOT to generate a new idea. Your job is to take an existing concept and amplify it — make it so culturally bold, so fully committed, so impossible to scroll past that it demands attention.

THIS IS NOT ABOUT DARKNESS OR SHOCK VALUE. Bold means: a brand taking a swing so brave and so specific that the industry talks about it for years. Think Old Spice turning absurdist humor into a cultural reset. Think REI closing on Black Friday to prove a point. Think Dove telling women the beauty industry lies to them, inside a beauty ad. THAT is the kind of bold we're after — brave, surprising, culturally alive, and impossible to ignore.

THE THREE AMPLIFICATION LEVERS:

LEVER 1 — SHARPER COLLISION: The idea probably has two interesting things that haven't been pushed far enough together. What's the most unexpected combination that still makes strategic sense? The more surprising the collision, the more the brain stops and pays attention. Not darkness — UNEXPECTEDNESS.

LEVER 2 — FULLER COMMITMENT: Whatever the idea is doing, it's probably doing it at 60%. Turn it up to 100. If it's funny, make it the funniest thing in the category. If it's honest, make it the most refreshingly direct thing a brand has ever said. If it's celebratory, make it genuinely joyful in a way that feels radical. Pick the dominant emotional register and commit to it so completely that there's no mistaking what this campaign is.

LEVER 3 — BOLDER STAND: What is the sharpest, most specific version of what this brand believes? Not a vague purpose statement — an actual point of view that competitors would never dare take. Something that makes the target audience feel genuinely seen and everyone else feel slightly left out.

THE PROCESS:
1. Find the soul of the existing concept — the one genuinely interesting thing at its core.
2. Remove anything cautious, generic, or compromise-driven. Keep the strategy, raise the creative stakes.
3. Ask: what would make a creative director stand up in the pitch meeting? Not shock — DELIGHT. Not darkness — BOLDNESS.
4. Amplify the collision, the commitment, and the POV simultaneously.
5. Rewrite the execution so each deliverable carries the full weight of the amplified idea.
6. The new headline should be the kind of line that gets written on a whiteboard and circled.

OUTPUT: Return the amplified concept in exactly the same format as the original — all the same section headers. Keep what's already great. Elevate everything else. The result should feel like the same idea that finally found the courage to be itself.`;

function TypewriterText({ text, speed = 6 }) {
  const [displayed, setDisplayed] = React.useState("");
  const [done, setDone] = React.useState(false);
  React.useEffect(() => {
    setDisplayed(""); setDone(false);
    let i = 0;
    const iv = setInterval(() => { i++; setDisplayed(text.slice(0, i)); if (i >= text.length) { clearInterval(iv); setDone(true); } }, speed);
    return () => clearInterval(iv);
  }, [text, speed]);
  return <span>{displayed}{!done && <span className="animate-pulse">▌</span>}</span>;
}

function PulsingDots({ msg }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "20px 0" }}>
      <div style={{ display: "flex", gap: 4 }}>
        {[0, 1, 2].map(i => (<div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: "#E85D26", animation: `pulseDot 1.2s ease-in-out ${i * 0.2}s infinite` }} />))}
      </div>
      <span style={{ color: "#E85D26", fontFamily: "'Space Mono', monospace", fontSize: 12, letterSpacing: 1 }}>{msg || LOADING_MSGS[Math.floor(Math.random() * LOADING_MSGS.length)]}</span>
    </div>
  );
}

async function callAPI(systemPrompt, userMessage, maxTokens, session, onPaywall) {
  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + session.access_token },
    body: JSON.stringify({ systemPrompt, userMessage, maxTokens })
  });
  const data = await res.json();
  if (res.status === 402) { if (onPaywall) onPaywall(); throw new Error("free_limit_reached"); }
  if (!res.ok || data.error) throw new Error(data.error || "API error");
  return data.text;
}

async function callAI(systemPrompt, userMessage, _unused, session, onPaywall) {
  return callAPI(systemPrompt, userMessage, 1000, session, onPaywall);
}
async function callAILong(systemPrompt, userMessage, _unused, session, onPaywall) {
  return callAPI(systemPrompt, userMessage, 4000, session, onPaywall);
}


function exportToPptx(idea, clientName, briefName) {

  // ── SLIDE 1: Cover ──────────────────────────────────────────────────────────
  const s1 = pres.addSlide();

function parseIdeas(raw) {
  return raw.split("---").map(block => block.trim()).filter(b => b.length > 50).map((block, i) => {
    const sections = {};
    const patterns = [
      { key: "name", regex: /\*\*\[?([^\]*]+)\]?\*\*/m },
      { key: "tension", regex: /\*\*THE CULTURAL TENSION:?\*\*\s*([\s\S]*?)(?=\*\*THE BIG IDEA|\*\*THE EXECUTION|$)/i },
      { key: "bigIdea", regex: /\*\*THE BIG IDEA:?\*\*\s*([\s\S]*?)(?=\*\*THE EXECUTION|\*\*THE ACTIVATION|$)/i },
      { key: "execution", regex: /\*\*THE EXECUTION:?\*\*\s*([\s\S]*?)(?=\*\*THE ACTIVATION|\*\*WHY IT WORKS|$)/i },
      { key: "activation", regex: /\*\*THE ACTIVATION:?\*\*\s*([\s\S]*?)(?=\*\*WHY IT WORKS|\*\*SAMPLE|---|$)/i },
      { key: "why", regex: /\*\*WHY IT WORKS:?\*\*\s*([\s\S]*?)(?=\*\*SAMPLE|\*\*HEADLINE|$)/i },
      { key: "headline", regex: /\*\*(?:SAMPLE )?HEADLINE:?\*\*\s*([\s\S]*?)$/i },
    ];
    patterns.forEach(({ key, regex }) => {
      const match = block.match(regex);
      sections[key] = match ? match[1]?.trim().replace(/\*\*/g, "") : "";
    });
    if (!sections.name) sections.name = `Concept ${i + 1}`;
    return sections;
  });
}

                            )}

                            {/* Supercharge Button */}
                            {!superLoading[i] ? (
                              <div style={{ marginTop: 20 }}>
                                <button
                                  onClick={() => superchargeIdea(i)}
                                  style={{
                                    width: "100%", padding: "16px", fontSize: 11, letterSpacing: 2,
                                    background: "linear-gradient(135deg, #1A0A00, #2A1000)",
                                    border: "1px solid rgba(232,93,38,.4)", borderRadius: 4,
                                    color: "#E85D26", fontFamily: "'Space Mono',monospace",
                                    cursor: "pointer", transition: "all .2s",
                                    display: "flex", alignItems: "center", justifyContent: "center", gap: 10
                                  }}
                                  onMouseEnter={e => { e.target.style.borderColor = "#E85D26"; e.target.style.background = "linear-gradient(135deg, #200C00, #3A1800)"; }}
                                  onMouseLeave={e => { e.target.style.borderColor = "rgba(232,93,38,.4)"; e.target.style.background = "linear-gradient(135deg, #1A0A00, #2A1000)"; }}
                                >
                                  <span style={{ fontSize: 16 }}>⚡</span>
                                  AMPLIFY THIS IDEA
                                  <span style={{ fontSize: 16 }}>⚡</span>
                                </button>
                                <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 8, color: "#444", textAlign: "center", marginTop: 6, letterSpacing: 1 }}>
                                  Make it bolder, sharper, and impossible to scroll past — same strategy, 10x the conviction
                                </div>
                              </div>
                            ) : (
                              <div style={{ marginTop: 20, padding: "20px", background: "rgba(232,93,38,.04)", border: "1px solid rgba(232,93,38,.15)", borderRadius: 4, textAlign: "center" }}>
                                <PulsingDots msg="Making it bolder, sharper, impossible to ignore..." />
                              </div>
                            )}

                            {/* Refine + Export row */}
                            <div style={{ marginTop: 16, borderTop: "1px solid #1A1A1A", paddingTop: 16 }}>
                              {!refineMode[i] ? (
                                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", flexDirection: "column" }}>
                                  <button className="btn-g" onClick={() => setRefineMode(prev => ({ ...prev, [i]: true }))} style={{ fontSize: 10, padding: "10px 18px" }}>
                                    ✎ Tweak This Concept
                                  </button>
                                  <button className="btn-g" onClick={() => exportToPptx(parsedIdeas[i], clientName, briefName)} style={{ fontSize: 10, padding: "10px 18px", display: "flex", alignItems: "center", gap: 6 }}>
                                    ↓ Export to PowerPoint
                                  </button>
                                </div>
                              ) : (
                                <div style={{ animation: "fadeUp .2s ease" }}>
                                  <div className="section-label" style={{ marginBottom: 8 }}>What would you like to change?</div>
                                  <textarea
                                    value={refineFeedback[i] || ""}
                                    onChange={e => setRefineFeedback(prev => ({ ...prev, [i]: e.target.value }))}
                                    placeholder={`e.g. "Make the tone more provocative" or "Shift the activation to something digital-first" or "The big idea is great but the headline needs to be sharper"`}
                                    style={{ width: "100%", minHeight: 90, background: "rgba(20,20,20,.8)", border: "1px solid rgba(232,93,38,.2)", borderRadius: 4, padding: "12px 14px", color: "#E8E4DE", fontFamily: "'Instrument Sans',sans-serif", fontSize: 13, lineHeight: 1.7, resize: "vertical", transition: "border-color .2s" }}
                                    onFocus={e => e.target.style.borderColor = "rgba(232,93,38,.5)"}
                                    onBlur={e => e.target.style.borderColor = "rgba(232,93,38,.2)"}
                                  />
                                  <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                                    {refineLoading[i] ? (
                                      <PulsingDots msg="Your ECD is refining the concept..." />
                                    ) : (
                                      <>
                                        <button className="btn-p" onClick={() => refineIdea(i)} disabled={!refineFeedback[i]?.trim()} style={{ fontSize: 10, padding: "10px 18px" }}>
                                          ✦ Refine Concept
                                        </button>
                                        <button className="btn-g" onClick={() => { setRefineMode(prev => ({ ...prev, [i]: false })); setRefineFeedback(prev => ({ ...prev, [i]: "" })); }} style={{ fontSize: 10, padding: "10px 18px" }}>
                                          Cancel
                                        </button>
                                      </>
                                    )}
                                  </div>
                                </div>
                              )}
                            </div>

                            {/* Art Direction Section */}
                            {!keyVisuals[i] && !visualLoading[i] && (
                              <div style={{ marginTop: 24 }}>
                                <button className="btn-g" onClick={() => generateKeyVisual(i)} style={{ fontSize: 10, padding: "12px 20px" }}>
                                  ✦ Generate Art Direction
                                </button>
                              </div>
                            )}
                            {visualLoading[i] && <PulsingDots msg="Art directing the key visual..." />}
                            {keyVisuals[i] && !visualLoading[i] && (
                              <ArtDirectionCard visual={keyVisuals[i]} onRegenerate={() => generateKeyVisual(i)} loading={visualLoading[i]} />
                            )}
                          </div>
                        )}
                      </div>
                    ))}

                    <div style={{ display: "flex", gap: 12, marginTop: 28 }}>
                      <button className="btn-p" onClick={generateCreativeIdeas}>✦ Regenerate</button>
                      <button className="btn-g" onClick={() => setShowIdeation(false)}>← Back to Brief</button>
                    </div>

                    <div style={{ marginTop: 32, padding: "20px 24px", background: "rgba(232,93,38,.02)", border: "1px solid rgba(232,93,38,.08)", borderRadius: 4 }}>
                      <div className="section-label" style={{ marginBottom: 6 }}>About Your AI ECD</div>
                      <p style={{ fontSize: 12, color: "#555", lineHeight: 1.7, margin: 0 }}>
                        These concepts are generated by an AI ECD trained on the creative philosophies of Wieden+Kennedy (no formula for creativity, fail better, cultural provocation), 72andSunny (optimism as strategy, world-building, culturally-led transformation), Edelman (earned-first thinking, brand movements, purpose that drives business), and GS&P (mass intimacy, humor, surprise, craft, restraint). Each concept follows a Heart / Guts / Hands framework. Use these as creative springboards — the best ideas get better when real humans push them further.
                      </p>
                    </div>
                  </div>
                )}

                {creativeIdeas && parsedIdeas.length === 0 && !ideaLoading && (
                  <div style={{ background: "rgba(232,93,38,.03)", border: "1px solid rgba(232,93,38,.12)", borderRadius: 4, padding: 24, whiteSpace: "pre-wrap", fontSize: 14, lineHeight: 1.85, color: "#BBB" }}>{creativeIdeas}</div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CreativeBriefTool));
  </script>
</body>
</html>
